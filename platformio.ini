	-D SPI_FREQUENCY=60000000
	-D SPI_READ_FREQUENCY=6000000
	-D USER_SETUP_LOADED=1
	-D SUPPORT_TRANSACTIONS
wt32-sc01 = 
	-D ST7796_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_ROTATION=0
	-D SPI_FREQUENCY=40000000
	-D USER_SETUP_LOADED=1
featherwing-35 = 
	-D HX8357D_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_ROTATION=0
	-D SPI_FREQUENCY=27000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D SPI_READ_FREQUENCY=20000000
	-D USER_SETUP_LOADED=1
	-D TOUCH_DRIVER=0x0610
featherwing-35-v2 = 
	-D HX8357D_DRIVER=1
	-D TFT_WIDTH=320
	-D TFT_HEIGHT=480
	-D TFT_ROTATION=0
	-D SPI_FREQUENCY=27000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D SPI_READ_FREQUENCY=20000000
	-D USER_SETUP_LOADED=1
	-D TOUCH_DRIVER=0x2007
featherwing-24 = 
	-D ILI9341_DRIVER=1
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_ROTATION=0
	-D SPI_FREQUENCY=27000000
	-D SPI_TOUCH_FREQUENCY=2500000
	-D SPI_READ_FREQUENCY=20000000
	-D USER_SETUP_LOADED=1
	-D TOUCH_DRIVER=0x0610
featherwing-24-v2 = 
	-D ILI9341_DRIVER=1
	-D TFT_WIDTH=240
	-D TFT_HEIGHT=320
	-D TFT_ROTATION=0
	-D SPI_FREQUENCY=27000000
	-D SPI_READ_FREQUENCY=20000000
	-D USER_SETUP_LOADED=1
	-D TOUCH_DRIVER=0x2007

[esp32]
extend = env
board_build.filesystem = littlefs
board_build.f_cpu = 240000000L
board_build.mcu = esp32
monitor_filters = esp32_exception_decoder
check_tool = cppcheck
check_flags = --enable=all
debug_tool = esp-prog
debug_init_break = tbreak setup
board_build.embed_files = 
	${esp32.files}
files = 
	data/static/edit.htm.gz
	data/openhasp.ttf
	data/static/style.css.gz
	data/static/script.js.gz
	data/cert/x509_crt_bundle.bin
	data/static/logo.svg.gz
	data/static/petite-vue.hasp.js.gz
	data/static/main.js.gz
	data/static/en.json.gz
	data/pages/pages.jsonl
build_flags = 
	${env.build_flags}
	-D HASP_TARGET_ARDUINO=1
	-D HTTP_UPLOAD_BUFLEN=1024
	-D MQTT_MAX_PACKET_SIZE=2048
	-D HASP_CONSOLE_BUFFER=256
	-D NO_GLOBAL_HTTPUPDATE
	-D LV_ATTRIBUTE_FAST_MEM=IRAM_ATTR
	-D LV_ATTRIBUTE_TASK_HANDLER=IRAM_ATTR
	-D LV_USE_FS_IF=1
	-D LV_FS_PC_PATH='"/littlefs"'
	-D ARDUINOJSON_ENABLE_PROGMEM=1
	-D HASP_ATTRIBUTE_FAST_MEM=IRAM_ATTR
	-D HASP_USE_TELNET=1
	-D HASP_USE_LITTLEFS=1
	-D HASP_USE_LVGL_TASK=0
	-D HASP_USE_CONFIG=1
	-D LV_LOG_TRACE_TIMER=1
	-D HASP_USE_PNGDECODE=1
	-D HASP_USE_BMPDECODE=1
	-D HASP_USE_JPGDECODE=0
	-D HASP_USE_GIFDECODE=0
	-D LV_FREETYPE_SBIT_CACHE=1
	-D LV_FREETYPE_CACHE_SIZE=1
	-D LV_USE_FT_CACHE_MANAGER=1
	-D LVGL_FREETYPE_MAX_FACES=16
	-D LVGL_FREETYPE_MAX_SIZES=16
	-D LVGL_FREETYPE_MAX_BYTES=2048
	-D LVGL_FREETYPE_MAX_BYTES_PSRAM=65536
	-D HASP_USE_FTP=1
	-D FTP_SERVER_DEBUG
	-D FTP_SERVER_NETWORK_TYPE=NETWORK_ESP32
	-D STORAGE_TYPE=STORAGE_LITTLEFS
	-D STORAGE_SD_FORCE_DISABLE
	-D STORAGE_SPIFFS_FORCE_DISABLE
lib_ignore = 
	${env.lib_ignore}
	GxTFT
	XPT2046_Touchscreen
	Adafruit GFX Library
	ESP32 BLE Arduino
	lv_drv_fsmc_ili9341
	lv_drivers
	AXP192
lib_deps = 
	${env.lib_deps}
	${arduinojson.lib_deps}
	git+https://github.com/fvanroie/ConsoleInput.git#dev
	bxparks/AceButton@^1.10.1
	bblanchon/StreamUtils@^1.8.0
extra_scripts = 
	pre:tools/auto_firmware_version.py
	tools/littlefsbuilder.py
	tools/esp_merge_bin.py
	tools/analyze_elf.py
ps_ram = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-D HASP_USE_FREETYPE=1
	-D LV_USE_FREETYPE=1
no_ps_ram = 
	-D HASP_USE_FREETYPE=1
	-D LV_USE_FREETYPE=1
vspi = 
	-D TFT_MISO=19
	-D TFT_MOSI=23
	-D TFT_SCLK=18
hspi = 
	-D TFT_MISO=12
	-D TFT_MOSI=13
	-D TFT_SCLK=14

[arduino_esp32_v1]
extends = esp32
framework = arduino
platform = espressif32@^3.5.0
lib_deps = 
	${esp32.lib_deps}
	lorol/LittleFS_esp32@^1.0.6

[arduino_esp32_v2]
extends = esp32
framework = arduino
platform = https://github.com/tasmota/platform-espressif32/releases/download/2023.10.03/platform-espressif32.zip
lib_ignore = 
	${esp32.lib_ignore}
	LittleFS_esp32

[flash_4mb]
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304
board_build.partitions = user_setups/esp32/partitions_4MB.csv

[flash_8mb]
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = user_setups/esp32/partitions_8MB.csv

[flash_16mb]
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = user_setups/esp32/partitions_16MB.csv

[esp32s2]
extends = esp32
board_build.mcu = esp32s2
build_flags = 
	${env.build_flags}
	-D HASP_TARGET_ARDUINO=1
	-D HTTP_UPLOAD_BUFLEN=512
	-D MQTT_MAX_PACKET_SIZE=2048
	-D HASP_CONSOLE_BUFFER=256
	-D NO_GLOBAL_HTTPUPDATE
	-D LV_ATTRIBUTE_FAST_MEM=
	-D LV_ATTRIBUTE_TASK_HANDLER=IRAM_ATTR
	-D LV_USE_FS_IF=1
	-D LV_FS_PC_PATH='"/littlefs"'
