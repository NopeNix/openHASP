name: Docker Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t openhasp-builder -f Dockerfile.platformio .
    
    - name: Build firmware
      run: |
        docker run --rm -v "$(pwd):/workspace" \
          -v "openhasp-pio-cache:/root/.platformio" \
          -w /workspace openhasp-builder \
          pio run -e sunton-8048s043r_16MB
    
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-sunton-8048s043r
        path: |
          build_output/firmware/*.bin
          .pio/build/sunton-8048s043r_16MB/firmware.bin
